    <style>
        /* 전체 배경색과 기본 폰트 */
        body {
            background: #44ACFF;
            color: #bbf631;
            line-height: 1.7;
            margin: 0;
        }
        /* 상단 헤더 꾸미기 */
        body {
            background-color: #44ACFF;
            color: #F9F6C4;
            text-align: center;
            padding: 50px 0;
            
        }

        /* 3. 메뉴바(nav) 꾸미기 */
        nav {
            text-align: center;
            padding: 15px;
            background-color: #89D4FF;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            color: #FE9EC7;
        }
        /* 4 이미지 (사진) 예쁘게 만들기 */
        img{
            display: block;
            margin: 30px auto;
            width: 250px;
            border-radius: 50px;
            border: 10px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0,1);



        }
        .my-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #72453fdc;
            color: white;
            text-decoration: none ;
            border-radius: 30px;
            margin-top: 20px;
            transition: 0.35;

        }
        /*마우스를 올리면(Hover) gyrhk*/
        .my-button:hover{
            background-color: #bbf631;
            transform: translateY(-3px);
        }
    </style>
</head>
